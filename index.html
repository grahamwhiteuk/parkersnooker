<!doctype html>
<html lang="en" ng-app="parkersnooker">
<head>
  <title>Parker Snooker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.2/angular.min.js"></script>
  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.2/angular-animate.min.js"></script>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-bootstrap/2.5.0/ui-bootstrap-tpls.min.js"></script>
  <script type="text/javascript" src="parkersnooker.js"></script>
  <style type="text/css">
    .nav, .pagination, .carousel, .panel-title a { cursor: pointer; }
    th { text-align: center; vertical-align: middle !important; }
    .panel-heading { cursor: pointer; }
    .table-nonfluid { width: auto !important; }
    table { max-width: 500px !important; }
    body { background-image: url("green.jpg"); }
    .navbar-brand { color: green !important; font-weight: bold; }
    .media { display: flex; flex-wrap: wrap; }
    .media iframe { width: 500px; height: 281px; margin-bottom: 10px; margin-right: 10px; }
    .media a { margin-bottom: 10px; margin-right: 10px; }
  </style>
</head>
<body>
  
  <!--
    Nav Bar
  -->
	<nav class="navbar navbar-default" role="navigation" ng-controller="NavbarCtrl">
    <div class="container">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" ng-click="isNavCollapsed = !isNavCollapsed">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href>Parker Snooker</a>
      </div>
      <div class="collapse navbar-collapse" uib-collapse="isNavCollapsed">
        <ul class="nav navbar-nav">
          <li id="dropdown" class="dropdown" uib-dropdown ng-controller="DropdownCtrl">
            <a href uib-dropdown-toggle class="dropdown-toggle" data-toggle="dropdown" role="button" aria-haspopup="true" aria-expanded="false">Tournament <span class="caret"></span></a>
            <ul class="dropdown-menu" uib-dropdown-menu>
              <li ng-repeat="tournament in tournaments"><a href ng-click="dropdownItemSelected(tournament)">{{tournament}}</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
	</nav>
  
  <div class="jumbotron">
    <div class="container">
      <h1 ng-controller="tournamentCtrl">Parker Snooker {{tournament}}</h1>
    </div>
  </div>

  <div class="container">

    <div ng-controller="tournamentCtrl" ng-include="tournament + '.html'"></div>    
    <div ng-include="'from-spreadsheet.html'"></div>
    
  </div><!-- /.container-->
  
</body>
</html>
